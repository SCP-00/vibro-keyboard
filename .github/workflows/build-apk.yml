name: Build APK

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate release keystore (for CI)
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias smarttext \
            -storepass smarttext123 \
            -keypass smarttext123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=SmartText, OU=Development, O=SmartText, L=Unknown, ST=Unknown, C=US"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartText-Keyboard-APK
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
