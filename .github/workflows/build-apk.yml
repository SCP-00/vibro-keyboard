name: Build APK

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: ''

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Debug workspace
        run: ls -la
        working-directory: ${{ github.workspace }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache
        working-directory: smarttext

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartText-Keyboard-APK
          path: smarttext/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: smarttext/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
